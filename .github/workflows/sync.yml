name: sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      push_freq:
        description: 'Push frequency'
        type: number
        required: true

jobs:
  sync:
    concurrency: sync
    runs-on: self-hosted

    steps:
     - name: clean
       run: |
         shopt -s dotglob && \
           rm -rf *

     - name: clone
       run: |
         git clone \
           --depth 1  \
           --filter=blob:none \
           --sparse \
           https://${{ secrets.ROBOCDNJS_TOKEN }}@github.com/cdnjs/cdnjs.git

     - name: sync
       env:
         PUSH_FREQ: ${{ inputs.push_freq || 5 }}
       run: |
         wget https://github.com/cdnjs/tools/releases/download/ccdcd747fe302d8ee86c191a2c2762a6a938188b9/git-sync
         chmod +x ./git-sync
         cd cdnjs
         git config user.name robocdnjs
         git config user.email cdnjs-github@cloudflare.com
         ../git-sync ./last-sync cdnjs-outgoing-prod
